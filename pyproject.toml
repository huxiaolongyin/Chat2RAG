[build-system]
requires = ["hatchling>=1.8.0"]
build-backend = "hatchling.build"

[project]
name = "chat2rag"
dynamic = ["version"]
description = "Chat with RAG"
readme = "README.md"
requires-python = ">=3.9"
license = { text = "Apache-2.0" }
authors = [{ name = "Jacob Zheng", email = "1453366421@qq.com" }]
keywords = ["rag", "llm", "chatbot", "tts", "asr"]
classifiers = [  # 添加分类信息
    "Development Status :: 4 - Beta",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
]

[project.optional-dependencies]
dev = { file = "requirements-dev.txt" }
prod = { file = "requirements-prod.txt" }

[tool.hatch.version]
path = "VERSION.txt"
pattern = "(?P<version>.+)"

[tool.hatch.metadata.hooks.requirements_txt]
filename = "requirements.txt"

[tool.hatch.build.targets.wheel]
packages = ["chat2rag"]

[project.urls]
"GitHub: issues" = "https://github.com/huxiaolongyin/Chat2RAG/issues"
"GitHub: repo" = "https://github.com/huxiaolongyin/Chat2RAG"

[tool.black]
line-length = 88  # 设置每行代码最大长度
target-version = ["py39"]  # 指定Python版本，确保格式化符合特定版本语法

[tool.isort]
profile = "black"  # 使用black兼容的配置
multi_line_output = 3  # 设置多行导入的格式化方式

[tool.ruff]
select = ["E", "F", "B"]  # 启用的规则集:
# E: pycodestyle错误
# F: pyflakes规则
# B: flake8-bugbear规则
ignore = ["E501"]  # 忽略行长度警告
target-version = "py39"  # 指定Python版本